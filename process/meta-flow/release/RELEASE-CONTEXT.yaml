schema_version: "1.0"
release_scope:
  feature: "workflow-eval-governance"
  source_crs: ["CR-018", "CR-019", "CR-020", "CR-021", "CR-022", "CR-023"]
  in_scope:
    - "Workflow eval contracts and generated workflow fixture"
    - "Local deterministic eval runner"
    - "CP7/meta-qa evaluation evidence consumption"
    - "Suite health and failure backlog"
    - "Optional adapter and CI policy"
  out_of_scope:
    - "External Promptfoo / DeepEval / Langfuse / Garak real execution"
    - "Credentialed network calls"
    - "Production target project writes"
version_decision:
  current_version: "0.4.0"
  recommended_change: "minor"
  reason: "Adds CLI subcommand and new eval governance assets without breaking installer CLI."
quality_summary:
  verification_report: "docs/quality/VERIFICATION-REPORT.md"
  test_report: "docs/quality/TEST-REPORT.md"
  review: "docs/quality/REVIEW.md"
  blocker_count: 0
  high_count: 0
  release_decision: "READY_WITH_RISK"
  residual_risks:
    - "Runner uses conservative YAML-like parsing."
    - "External adapters are policy-only and disabled by default."
affected_surface:
  platforms: ["codex", "claude", "openclaw"]
  components: ["cli", "evals", "docs", "delivery-rules", "meta-qa", "verification-execution"]
  state_schema: ["target_project_profile", "validation_target", "workflow_eval"]
  external_interfaces: []
install_validation_summary:
  commands:
    - "python3 -m py_compile meta_flow/cli.py meta_flow/evals/runner.py"
    - "python3 -m meta_flow.cli eval validate --eval evals/fixtures/generated-workflow-basic/WORKFLOW-EVAL.yaml"
    - "python3 -m meta_flow.cli eval run --eval evals/fixtures/generated-workflow-basic/WORKFLOW-EVAL.yaml --out process/evals/runs/generated-workflow-basic"
    - "python3 -m meta_flow.cli eval suite-health --runs process/evals/runs --out docs/quality/EVAL-SUITE-HEALTH.md"
  result: "PASS"
release_documents:
  profile: "compact"
  release_notes: "docs/release/RELEASE-NOTES.md"
  deploy_checklist: "docs/release/DEPLOY-CHECKLIST.md"
  rollback: "docs/release/ROLLBACK.md"
  migration: "docs/release/MIGRATION.md"
  feedback: "docs/release/FEEDBACK.md"
non_authorized_items:
  - "External SaaS execution"
  - "Credentials"
  - "Trace upload"
  - "Publish / live operation"
  - "Production target project write"
follow_up_summary:
  open_candidates: 0
  failure_backlog: "docs/quality/FAILURE-BACKLOG.md"
