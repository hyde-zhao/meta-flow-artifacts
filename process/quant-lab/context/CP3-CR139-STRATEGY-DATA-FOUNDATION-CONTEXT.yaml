## 核心已知结论（来自 handoff v0.7 + CR-139 CP2，无需重新调研）
- 整改目标：数据湖支撑多因子+ML 策略四阶段全流程可信/可复现/可审计。
- 四组门禁（数据/研究/ML/交易生产）是 CP3 必过门禁（D7），需在 HLD 落为门禁设计。
- 45 项整改分类锁定：(a)=6 已设计未实现 / (b)=7 设计过期 / (c)=12 范围扩展 / (d1)=6 纯新建 / (d2)=14 既有合同闭环。
- 四道 P0 防线：C1 PIT as-of reader、C2 分区去重、V1 published 快照、R1 panel reader。
- D2 决策：新开 companion HLD「Strategy Data Foundation」（写侧/读侧分离），收口 HLD-DATA-LAKE.md。
- D4：DuckDB 只读引擎，parquet 仍是存储；D5：ML feature 层 lake `features/` 子层带版本（附条件保留切换独立 store）。
- 既有合同已存在（整改为闭环非新建，15 类，handoff §1.6 + CR-139 §4.1）：d2 14 项不重复设计，走集成闭环 LLD。
- Wave1 基线门（CP2 追加约束）：结构性变更（V1/C1/R1/C2b/N1）必须在 T8 清册→T7 黄金值→C2a 重复画像之后执行（REQ-247）。
- V4 schema 契约冻结必须前置到模拟盘前（评审 HIGH3，Wave2）。

## CP3 Architecture Gray Areas（规则 45，meta-se 识别关键灰区，advisor lane 用 Option/Pros/Cons/Impact Surface/Recommendation/Assumptions-When-to-switch 表格优先输出）
候选（meta-se 可调整）：
- AGA-1 写侧/读侧分离边界：companion HLD 如何切写侧（normalize/publish/lineage）与读侧（PIT reader/panel reader/dedup/published selector），与既有 FEAT-02 写侧职责如何对接
- AGA-2 published current pointer 与 catalog 主从：V1 pointer、M1 catalog/manifest 双真相源、published 门禁如何统一为单一真相源
- AGA-3 ML feature 层归属与切换条件：lake `features/` 子层（D5）vs 独立 feature store，版本化 schema 与 artifact hash 闭环如何设计，切换条件如何保留
- AGA-4 run-id 贯通与读审计（L3/T6）：数据 run-id 如何贯穿 reader→RunEvidenceIndex→broker event，读审计 log 的写入边界与既有 evidence_index 如何对接
- AGA-5 配置类事实源版本化机制（F1-F4）：benchmark/commission/universe·risk policy/政策周期如何统一版本化事实源 + release 闭环，复用 V1 published pointer 机制还是独立
- AGA-6 schema 演进与契约冻结（V4）：schema 版本演进规则 + reader 兼容回退 + 模拟盘前冻结如何落为门禁

