## Story 拆解要求

### 拆分原则
按 Wave1 P0（MVP）优先拆，覆盖全 45 项整改但分 Wave。每个 Story 必须可独立验收、文件所有权不冲突。

**Wave1 P0 Story（MVP，必须先拆，按基线门顺序）**：
- T8 整改对象自动化清册（d1，full-lld）→ 基线冻结第 1 步
- T7 整改回归基线 + 黄金值快照（d1，full-lld）→ 基线冻结第 2 步
- C2a 重复画像（b，technical-note）→ 基线冻结第 3 步
- 【基线门：以上三步完成后方可执行以下结构性变更】
- V1 published pointer / read selector（a，technical-note 消费既有 HLD 契约）
- C1 PIT as-of reader（a，technical-note）
- R1 panel reader（c，full-lld）
- C2b 读层去重（b，technical-note）
- N1 物理迁移后置（c，full-lld，但实现后置到基线冻结之后，可作 Wave1 收尾 Story 标 deferred-execution）

**Wave2 P1 Story（解锁 ML + 模拟盘）**：V4/R2/V3/E1-E5/R3/L1-L2/L3-L4/E3-E4/F1-F3/T4-T6/X1-X4/T2-T3/N1收尾/C3/M1
**Wave3 P2 Story（实盘运维）**：L5/R4/T1/M3-M4/F4

### 每个 Story 卡片必须包含
- Story ID（CR139-S01..Snn）、标题、Owner Feature（按 MATRIX v1.13 归属）、lld_policy（d1=full-lld / d2=technical-note / a=technical-note / c=full-lld / b=technical-note）、Wave、依赖（前置 Story ID）、文件所有权（代码触点，来自 handoff §3）、验收标准、状态=lld-pending（等 CP5 LLD）

### DAG 与并行安全
- 依赖类型标注：runtime（等上游 verified）/ file-conflict（串行）/ contract（等上游契约冻结）
- Wave1 基线门（REQ-247）作为硬依赖：T8/T7/C2a 必须 verified 后 V1/C1/R1/C2b 才能开始
- 文件所有权冲突检查：readers.py 被 C1/R1/C2b/E4/X1/X3 多 Story 触及 → 必须串行或拆分所有权
- 跨边界项 T6 run-id 贯通（FEAT-02 生成 + FEAT-06/11 消费）显式标注 owner/consumer

