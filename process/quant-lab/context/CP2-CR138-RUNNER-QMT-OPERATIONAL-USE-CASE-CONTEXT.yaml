decision_items:
  - id: DQ-CP2-CR138-01
    decision_type: scope
    question: "是否确认 CR138 的目标是 Runner / QMT Gateway 运营 use-case baseline，而不是继续补离线小 slice 或直接实现 online runtime？"
    recommendation: "确认；以 UC-33..UC-50 为 draft baseline，后续先进入功能模型 / HLD。"
    alternatives:
      - "继续补离线 runner batch run / reporting 小能力。"
      - "直接启动 QMT Gateway / online runtime 设计或实现。"
    impact_risk: "决定后续是否重回产品场景和功能模型；直接实现会放大授权和架构风险。"
    rollback_switch: "若用户认为 UC-33..UC-50 范围过大，可缩小为 Runner-only 或 Gateway-only baseline。"
  - id: DQ-CP2-CR138-02
    decision_type: architecture
    question: "是否确认 Runner 与 QMT Gateway 的职责边界？"
    recommendation: "Runner 负责策略如何运行、观察、调整、复盘；QMT Gateway 负责安全稳定触达 QMT / MiniQMT / XtQuant。"
    alternatives:
      - "Runner 直接内嵌 Gateway / xtquant 调用。"
      - "Gateway 同时承担策略调度和策略逻辑。"
    impact_risk: "边界不清会造成策略直连 QMT、Gateway 过度业务化和后续测试不可分。"
    rollback_switch: "HLD 若发现单机 PoC 需要更薄边界，可作为 HLD 决策项重新评估。"
  - id: DQ-CP2-CR138-03
    decision_type: runtime_authorization
    question: "CR138 是否授权 runtime、QMT、MiniQMT、XtQuant、凭据、账户查询、行情订阅、submit/cancel 或 simulation/live？"
    recommendation: "不授权；全部保持 deny-default，真实运行另起 runtime_authorization CR。"
    alternatives:
      - "另起只读 Gateway runtime authorization gate。"
      - "由用户手动提供脱敏运行证据，不由 agent 执行。"
    impact_risk: "防止 use-case baseline 被误读为真实运行授权。"
    rollback_switch: "用户明确给出运行窗口、边界、脱敏和回滚条件后，另起 CR。"
