## LLD 写作要求

### full-lld（S01/S02/S03/S06/S07/S08）→ `process/stories/CR139-Snn-<slug>-LLD.md`
14 章节齐全（参考 lld-designer skill）：
1. 问题定义与目标（量化验收条件）
2. 模块拆分与文件影响范围（基于 handoff §3 代码触点 + DEVELOPMENT-PLAN merge_order）
3. 数据模型 / schema 变更
4. 接口契约（函数签名、输入输出、与相邻 Story 的契约方向）
5. 关键流程（含 Wave1 基线门：S01/S02/S03 verified 后 S04-S08 才实现的时序）
6. 异常处理与失败路径
7. 测试设计（fixture / 黄金值对比 / PIT 正确性回归）
8. 实施步骤（最小实现切片）
9. 风险与应对
10. 发布与回滚策略
11. 平台差异检查
12. 设计契约映射（回链 HLD §10 模块 / ADR / REQ）
13. Gotchas
14. open_items / tier / shared_fragments

### technical-note（S04/S05）→ 在 Story 卡片 `process/stories/CR139-S04/S05-*.md` 内追加 `## 技术说明`
覆盖：文件影响、接口/数据、失败路径、测试入口、风险、偏离记录。a 类（S04 V1 / S05 C1）消费既有 HLD-DATA-LAKE 契约，不重复设计。

