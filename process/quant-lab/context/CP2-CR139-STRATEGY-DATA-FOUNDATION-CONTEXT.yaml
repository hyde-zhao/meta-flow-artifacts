## 核心已知结论（来自 handoff v0.7，无需重新调研）
- 整改目标：数据湖支撑多因子 + ML 策略从信息收集→回测→模拟盘→实盘全流程，可信/可复现/可审计。
- 四组门禁（数据/研究/ML/交易生产）构成信任基础，是 CP3 必过门禁（D7）。
- 整改清单 45 项，机械统计：(a)=6 已设计未实现 / (b)=7 设计过期 / (c)=12 范围扩展 / (d1)=6 纯新建 / (d2)=14 既有合同闭环。
- 四道 P0 防线：C1 PIT as-of reader、C2 分区去重、V1 published 快照、R1 panel reader。
- Wave1 顺序：T8 清册→T7 黄金值→C2a 重复画像→V1 pointer→C1→R1→C2b 读层去重→N1 物理迁移后置（不先改物理分区）。
- 既有合同已存在（整改为闭环非新建）：ExperimentManifest / StrategyAdmissionPackage / RunEvidenceIndex / BrokerLakeSchema / CommissionSchedule / benchmark contract / PortfolioRiskPolicy / policy_cycle_coverage / incremental·publish·readiness·replay / decision_time / survivorship_bias_note 等，详见 handoff §1.6 与 CR-139 §4.1。

