architecture_gray_areas:
  - id: AGA-138-01
    status: resolved
    decision: "Runner Control Plane 独立于 offline strategy-runner-core。"
  - id: AGA-138-02
    status: resolved
    decision: "QMT Gateway 作为 Service Layer，而非只读 endpoint 或策略 target。"
  - id: AGA-138-03
    status: resolved
    decision: "Runner / Gateway 通过领域命令、事件、授权记录、幂等键和审计 ID 衔接。"
  - id: AGA-138-04
    status: resolved
    decision: "CP3 approval 不自动授权 runtime；后续必要验证可按需申请 runtime_authorization。"
  - id: AGA-138-05
    status: resolved-with-risk
    decision: "保留单份 umbrella HLD，CP4 按 Feature 拆 Story。"
  - id: AGA-138-06
    status: resolved
    decision: "Gateway P0 收敛为 REST-only；SSE/WebSocket、gRPC、FIX 后置。"
decision_items:
  - id: DQ-CP3-CR138-01
    decision_type: architecture
    question: "是否批准方案 A：独立 Runner Control Plane + QMT Gateway Service Layer？"
    recommendation: "批准；新增 FEAT-11 / FEAT-12，现有 FEAT-05/06/09/strategy-runner-core 作为输入和相邻边界。"
    alternatives:
      - "扩展 offline strategy-runner-core 直接接 Gateway / xtquant。"
      - "由 Gateway 同时承接策略调度和 QMT 触达。"
    impact_risk: "决定 CP4 Story owner、模块边界和测试矩阵。"
    rollback_switch: "若用户缩小范围，可切到 Runner-only 或 Gateway-only。"
  - id: DQ-CP3-CR138-02
    decision_type: architecture
    question: "Gateway P0 协议是否采用 REST-only，SSE/WebSocket、gRPC、FIX 后置？"
    recommendation: "采用 REST-only P0；用 REST 覆盖查询、命令、订阅管理、状态拉取、事件拉取和审计查询。"
    alternatives:
      - "REST + SSE / WebSocket。"
      - "gRPC-first。"
    impact_risk: "REST-only 降低 P0 复杂度；不能解决亚秒级实时推送和外部 SDK 流式消费。"
    rollback_switch: "若后续出现实时 UI、低延迟行情流或上游 OMS/EMS 接入需求，另起 SSE/WebSocket/gRPC/FIX CR。"
  - id: DQ-CP3-CR138-03
    decision_type: runtime_authorization
    question: "是否确认 CP3 approval 不自动授权 runtime，但后续必要验证可以按需申请 runtime_authorization？"
    recommendation: "确认；CP3 不自动授权任何 runtime/QMT/账户/行情/订单/交易动作，后续验证按 action scope、运行窗口、脱敏、回滚和审计范围单独授权。"
    alternatives:
      - "blanket deny：后续也默认不允许 runtime 验证。"
      - "CP3 直接授权只读 / 行情 / 交易。"
    impact_risk: "推荐方案同时防止设计通过被误读为运行许可，并保留必要验证路径。"
    rollback_switch: "任何具体运行前必须重新发起 runtime_authorization gate。"
  - id: DQ-CP3-CR138-04
    decision_type: risk_acceptance
    question: "是否接受本轮单份 umbrella HLD，CP4 再按 Runner/Gateway/Safety/OMS 拆 Story？"
    recommendation: "接受；当前共享事件契约和授权边界较多，单份 HLD 更利于 CP3 评审。"
    alternatives:
      - "立即拆成 Runner HLD 和 Gateway HLD。"
      - "只保留 Runner 或只保留 Gateway。"
    impact_risk: "单份 HLD 较长，但 CP4 必须拆 Story 控制复杂度。"
    rollback_switch: "若 CP3 评审认为范围过大，拆分 HLD 后重发 CP3。"
  - id: DQ-CP3-CR138-05
    decision_type: architecture
    question: "是否确认交易日历、佣金 / 费用模型、收益 / PnL 查询进入 FEAT-12 Reference / Account Query Service，并按本地参考 / 账户只读授权分层？"
    recommendation: "确认；交易日历优先本地参考数据，佣金优先配置化 FeeSchedule，账户级收益 / 佣金 / 持仓 / 成交查询必须授权并脱敏。"
    alternatives:
      - "放在 FEAT-11 Runner Control Plane。"
      - "延后到 FEAT-06 OMS / Risk。"
    impact_risk: "推荐方案能支撑 preflight、费用估算和盘后复盘；放 Runner 会诱导越权账户读取，延后会缺核心运营能力。"
    rollback_switch: "实现阶段若 QMT 不支持对应查询，使用 unavailable_with_reason 或 estimated mode，不伪造 broker facts。"
