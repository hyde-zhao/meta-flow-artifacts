key_facts:
  design_principles:
    - "remote URL must be user-provided or explicitly confirmed"
    - "origin is the recommended remote name unless user chooses another"
    - "target branch defaults to current branch name for auditability"
    - "git ls-remote is optional and requires explicit authorization"
    - "remote add and push are separate actions"
    - "force push, tag and history rewrite remain out of scope"
  stop_conditions:
    - "remote URL missing"
    - "remote URL contains credential-like material"
    - "ls-remote denied or failed"
    - "remote add denied or failed"
    - "target branch mismatch"
    - "non-fast-forward push rejection"
    - "user asks for force, tag, default branch or history rewrite"
