schema_version: "1.0"
change_id: "CR-067"
created_at: "2026-06-15T11:53:48+08:00"
created_by: "host-orchestrator"
purpose: "Gate-only clean publication execution manifest."
execute_allowed_now: false
approval_required:
  gates:
    - "process/checkpoints/CP2-CR067-CLEAN-PUBLICATION-EXECUTION-BASELINE.md"
    - "process/checkpoints/CP3-CR067-CLEAN-PUBLICATION-EXECUTION-HLD-REVIEW.md"
    - "process/checkpoints/CP5-CR067-CLEAN-PUBLICATION-EXECUTION-READINESS.md"
  required_status: "approved"
target:
  remote_candidate: "git@github.com:hyde-zhao/quant-lab.git"
  current_branch_policy: "do not push current branch as-is"
  recommended_route: "temporary clean snapshot + allowlist manifest + fail-closed scan + exact remote push"
  branch_policy: "no current branch rename; clean snapshot branch/default only if CP5 authorizes"
must_include:
  - "README.md"
  - "docs/USER-MANUAL.md"
  - "pyproject.toml"
  - "uv.lock"
  - "quant_lab/**"
  - "engine/**"
  - "market_data/**"
  - "strategies/**"
  - "trading/**"
  - "tests/conftest.py"
  - "tests/test_cr061_package_import_layout.py"
conditional_include:
  - path: ".env.example"
    condition: "placeholder-only and no-secret scan PASS; explicit CP5 acceptance"
  - path: "selected docs/release CR061/CR066/CR067 evidence"
    condition: "public-safe, no internal topology, size controlled"
  - path: "selected process/changes CR061/CR062/CR066/CR067 evidence"
    condition: "public-safe audit summary only; no full process history"
default_exclude:
  - ".env"
  - ".env.local"
  - ".envrc"
  - "data/**"
  - "reports/**"
  - "runs/**"
  - ".venv/**"
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "process/STATE.md"
  - "full process/checks/**"
  - "full process/checkpoints/**"
  - "full process/context/**"
  - "ops/systemd/**"
  - "NAS mount / systemd / internal topology files"
scan_gate:
  required_before_git_write:
    - "no-secret scan"
    - "data/report/run path scan"
    - "large-file scan"
    - "internal topology scan"
    - ".env.example placeholder-only scan"
  fail_closed_on:
    - "BLOCKING finding"
    - "HIGH finding without explicit DQ"
    - "unexpected .env/data/reports/runs file in snapshot"
    - "remote target mismatch"
forbidden_before_approval:
  - "git add"
  - "git commit"
  - "git remote add"
  - "git push"
  - "git tag"
  - "branch creation"
  - "branch rename"
  - "history rewrite"
  - "force push"
  - "remote deletion"
  - "credential or .env read except approved .env.example scan"
  - "NAS/data lake/provider/catalog/runtime operations"
  - "physical move/rename/delete"
  - "bulk import rewrite"
  - "CR046 recovery"
post_approval_execution_order:
  - "Re-read CP5 checkpoint and confirm approved."
  - "Create temporary clean snapshot outside current worktree."
  - "Copy only allowlisted files; exclude cache and forbidden paths."
  - "Run required scan gate."
  - "Fail closed on any blocking/high finding."
  - "Only after PASS initialize temporary Git repository, commit clean baseline, add exact remote, and push."
  - "Record execution evidence and do not force push, tag, delete remote, or rewrite history."
