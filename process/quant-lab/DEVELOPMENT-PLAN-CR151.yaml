parallel_policy:
  max_parallel_lld: 2
  max_parallel_dev_after_cp5: 1
  max_parallel_verification_after_cp6: 2
  same_file_merge_rule: "S01 and S02 share engine/strategy_admission_statistical_gate.py and tests/test_cr151_strategy_admission_statistical_gate.py; S01 contract skeleton must merge before S02 evaluator implementation."
  cr150_linkage_rule: "S03 owns any change to engine/mature_multifactor_research.py or engine/strategy_admission_package.py; it must not run before S01/S02 status semantics are frozen."
  evidence_wording_rule: "S04 consolidates evidence/release wording after S01-S03 design decisions are stable."

waves:
  - wave: "CR151-W1-CONTRACTS"
    objective: "Define Wave A statistical report contracts and JSON-safe validation issue surfaces."
    parallel_lld: false
    parallel_dev_after_cp5: false
    entry_conditions:
      - "CR151 CP3 approved"
      - "FEAT-03 CR151 increment recorded in Feature Design Matrix"
    stories:
      - story_id: "CR151-S01-statistical-report-contracts"
        title: "Statistical report contracts"
        priority: "P0"
        status: "implemented"
        depends_on: []
        primary_files:
          - "engine/strategy_admission_statistical_gate.py"
          - "tests/test_cr151_strategy_admission_statistical_gate.py"
        merge_owner: "CR151-S01-statistical-report-contracts"
        lld_gate:
          required: true
          required_level: "full-lld"
          status: "approved"
        dev_gate:
          cp5_required: true
          implementation_allowed_before_cp5: false
          cp6_status: "PASS"

  - wave: "CR151-W2-GATE-EVALUATOR"
    objective: "Implement fail-closed aggregate status semantics over the contracts."
    parallel_lld: false
    parallel_dev_after_cp5: false
    entry_conditions:
      - "S01 contract LLD available for review"
    stories:
      - story_id: "CR151-S02-gate-evaluator-fail-closed-rules"
        title: "Gate evaluator and fail-closed rules"
        priority: "P0"
        status: "implemented"
        depends_on:
          - "CR151-S01-statistical-report-contracts"
        primary_files:
          - "engine/strategy_admission_statistical_gate.py"
          - "tests/test_cr151_strategy_admission_statistical_gate.py"
        merge_owner: "CR151-S02-gate-evaluator-fail-closed-rules"
        lld_gate:
          required: true
          required_level: "full-lld"
          status: "approved"
        dev_gate:
          cp5_required: true
          implementation_allowed_before_cp5: false
          cp6_status: "PASS"

  - wave: "CR151-W3-LINKAGE"
    objective: "Link the statistical gate into the admission/completion chain without runtime semantics changes."
    parallel_lld: false
    parallel_dev_after_cp5: false
    entry_conditions:
      - "S01/S02 status semantics frozen"
    stories:
      - story_id: "CR151-S03-admission-completion-linkage"
        title: "Admission and completion linkage"
        priority: "P0"
        status: "implemented"
        depends_on:
          - "CR151-S01-statistical-report-contracts"
          - "CR151-S02-gate-evaluator-fail-closed-rules"
        primary_files:
          - "engine/mature_multifactor_research.py"
          - "engine/strategy_admission_package.py"
          - "tests/test_cr150_multifactor_framework_completion.py"
          - "tests/test_cr151_strategy_admission_statistical_gate.py"
        merge_owner: "CR151-S03-admission-completion-linkage"
        lld_gate:
          required: true
          required_level: "full-lld"
          status: "approved"
        dev_gate:
          cp5_required: true
          implementation_allowed_before_cp5: false
          cp6_status: "PASS"

  - wave: "CR151-W4-EVIDENCE"
    objective: "Consolidate static-only evidence and release wording."
    parallel_lld: true
    parallel_dev_after_cp5: false
    entry_conditions:
      - "S01/S02/S03 design decisions available"
    stories:
      - story_id: "CR151-S04-static-evidence-release-wording"
        title: "Static evidence and release wording"
        priority: "P1"
        status: "implemented"
        depends_on:
          - "CR151-S01-statistical-report-contracts"
          - "CR151-S02-gate-evaluator-fail-closed-rules"
          - "CR151-S03-admission-completion-linkage"
        primary_files:
          - "process/returns/CR151-*"
          - "process/evidence/CR151-*"
          - "docs/release/*"
        merge_owner: "CR151-S04-static-evidence-release-wording"
        lld_gate:
          required: true
          required_level: "technical-note"
          status: "approved"
        dev_gate:
          cp5_required: true
          implementation_allowed_before_cp5: false
          cp6_status: "PASS"

