execution_blocked_reason: "Post-approval preflight found tracked forbidden publication paths: reports/**, runs/** and .env.example. No git add/commit/remote add/push executed."
preflight_result: "process/checks/CR062-POST-APPROVAL-PREFLIGHT.md"
target:
  canonical_project_name: "quant-lab"
  remote_candidate: "git@github.com:hyde-zhao/quant-lab.git"
  branch_policy: "use current branch after approval; do not rename branch"
  remote_policy: "add target remote only if absent; if existing remote conflicts, stop and ask"
approval_required:
  gates:
    - "process/checkpoints/CP2-CR062-REQUIREMENTS-BASELINE.md"
    - "process/checkpoints/CP3-CR062-HLD-REVIEW.md"
    - "process/checkpoints/CP5-CR062-REPOSITORY-PUBLICATION-READINESS.md"
  required_status: "approved"
post_approval_sequence:
  - step: "preflight"
    actions:
      - "read current branch"
      - "read Git status"
      - "read existing remote configuration"
      - "stop on remote conflict"
  - step: "scan"
    actions:
      - "secret scan with forbidden path exclusions"
      - "data body/path boundary scan"
      - "large file scan"
      - "path allowlist / denylist scan"
  - step: "manifest_freeze"
    actions:
      - "freeze exact paths to stage"
      - "confirm forbidden paths absent"
  - step: "publication"
    actions:
      - "git add approved paths only"
      - "git commit normal publication commit"
      - "git remote add exact target only if absent"
      - "git push current branch"
forbidden_even_after_approval:
  - "git tag"
  - "branch rename"
  - "history rewrite"
  - "force push"
  - "remote deletion"
  - "NAS data copy/move/delete/archive promote"
  - "MARKET_DATA_LAKE_ROOT replacement"
  - "provider fetch"
  - "lake write"
  - "catalog publish"
  - "credential or .env read"
  - "QMT/MiniQMT runtime"
  - "physical move/rename/delete"
  - "bulk import rewrite"
  - "CR046 recovery"
candidate_include_policy:
  - "repo code and metadata approved by CR061 / CR062"
  - "README / docs needed for quant-lab public baseline"
  - "process/changes CR058-CR062 evidence needed for migration audit"
  - "process/checks/checkpoints/context/release evidence scoped to CR058-CR062 where publication is explicitly approved"
candidate_exclude_policy:
  - ".env"
  - ".env*"
  - "data/**"
  - "reports/**"
  - "runs/**"
  - ".venv/**"
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "/mnt/**"
  - "NAS mounts"
  - "credential material"
  - "runtime account material"
