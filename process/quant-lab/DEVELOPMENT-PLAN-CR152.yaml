      - "CR152-S03-training-model-prediction-metadata"
      - "CR152-S04-ml-admission-gate-adapter"
      - "CR152-S05-static-evidence-release-wording"

lld_design_batch:
  batch_id: "CR152-ML-STRATEGY-E2E-BATCH-A"
  status: "pending-cp5"
  cp5_manual_review: "process/checkpoints/CP5-CR152-ML-STRATEGY-E2E-LLD-BATCH.md"
  policy: "S01-S04 require full-lld; S05 requires technical-note. CP5 must review all design evidence together before implementation."
  stories:
    - "CR152-S01-pit-feature-label-contracts"
    - "CR152-S02-purged-embargo-cv-fixture-contract"
    - "CR152-S03-training-model-prediction-metadata"
    - "CR152-S04-ml-admission-gate-adapter"
    - "CR152-S05-static-evidence-release-wording"
  cp5_attention_items:
    - id: "CP5-FOCUS-CR152-001"
      story: "CR152-S01-pit-feature-label-contracts"
      requirement: "Make first-wave active triple_barrier enforcement exact; recommended BLOCKED because algorithm is not implemented."
    - id: "CP5-FOCUS-CR152-002"
      story: "CR152-S04-ml-admission-gate-adapter"
      requirement: "If adapter implementation details or contract delta field mapping need architecture deepening, dispatch meta-se or explicitly record inline-fallback approval."

parallel_policy:
  max_parallel_lld: 2
  max_parallel_dev_after_cp5: 1
  max_parallel_verification_after_cp6: 2
  same_file_merge_rule: "S01 and S02 share engine/research_production_contracts.py and tests/research/test_ml_strategy_e2e_contracts.py; S01 PIT/label fields must freeze before S02 split audit details."
  metadata_linkage_rule: "S03 depends on S01/S02 because training/model/prediction metadata must link PIT/label/split fingerprints."
  adapter_rule: "S04 depends on S01-S03 and owns ML gate status/package linkage; any semantic ambiguity returns to CP5 design, not CP6 implementation."
  evidence_wording_rule: "S05 consolidates evidence/release wording after S01-S04 design decisions are stable."

waves:
  - wave: "CR152-W1-PIT-LABEL"
    objective: "Define PIT feature matrix and label policy contracts."
    parallel_lld: false
    parallel_dev_after_cp5: false
    entry_conditions:
      - "CR152 CP3 approved"
      - "FEAT-03 CR152 increment recorded in Feature Design Matrix"
    stories:
      - story_id: "CR152-S01-pit-feature-label-contracts"
        title: "PIT feature matrix and label policy contracts"
        priority: "P0"
        status: "lld-ready-for-review"
        depends_on: []
        primary_files:
          - "engine/research_production_contracts.py"
          - "tests/research/test_ml_strategy_e2e_contracts.py"
        merge_owner: "CR152-S01-pit-feature-label-contracts"
        lld_gate:
          required: true
          required_level: "full-lld"
          status: "pending"

  - wave: "CR152-W2-CV-FIXTURE"
    objective: "Define purged + embargo CV and fixture contract."
    parallel_lld: false
    parallel_dev_after_cp5: false
    entry_conditions:
      - "S01 PIT and label fields available for review"
    stories:
      - story_id: "CR152-S02-purged-embargo-cv-fixture-contract"
        title: "Purged embargo CV and fixture contract"
        priority: "P0"
        status: "lld-ready-for-review"
        depends_on:
          - "CR152-S01-pit-feature-label-contracts"
        primary_files:
          - "engine/research_production_contracts.py"
          - "tests/research/test_ml_strategy_e2e_contracts.py"
        merge_owner: "CR152-S02-purged-embargo-cv-fixture-contract"
        lld_gate:
          required: true
          required_level: "full-lld"
          status: "pending"

  - wave: "CR152-W3-ARTIFACT-METADATA"
    objective: "Define training snapshot, model artifact and prediction metadata linkage."
    parallel_lld: false
    parallel_dev_after_cp5: false
    entry_conditions:
      - "S01/S02 contract semantics available"
    stories:
      - story_id: "CR152-S03-training-model-prediction-metadata"
        title: "Training, model and prediction metadata"
        priority: "P0"
        status: "lld-ready-for-review"
        depends_on:
          - "CR152-S01-pit-feature-label-contracts"
          - "CR152-S02-purged-embargo-cv-fixture-contract"
        primary_files:
          - "engine/training_snapshot_contract.py"
          - "engine/research_manifest.py"
          - "tests/research/test_ml_strategy_e2e_contracts.py"
        merge_owner: "CR152-S03-training-model-prediction-metadata"
        lld_gate:
          required: true
          required_level: "full-lld"
          status: "pending"

  - wave: "CR152-W4-ML-GATE"
    objective: "Define ML admission gate and CR151 status/admission adapter."
    parallel_lld: false
    parallel_dev_after_cp5: false
    entry_conditions:
      - "S01/S02/S03 evidence fields available"
    stories:
      - story_id: "CR152-S04-ml-admission-gate-adapter"
        title: "ML admission gate adapter"
        priority: "P0"
        status: "lld-ready-for-review"
        depends_on:
          - "CR152-S01-pit-feature-label-contracts"
          - "CR152-S02-purged-embargo-cv-fixture-contract"
          - "CR152-S03-training-model-prediction-metadata"
        primary_files:
          - "engine/ml_strategy_admission_gate.py"
          - "engine/strategy_admission_package.py"
          - "tests/research/test_ml_strategy_e2e_contracts.py"
        merge_owner: "CR152-S04-ml-admission-gate-adapter"
        lld_gate:
          required: true
          required_level: "full-lld"
          status: "pending"

  - wave: "CR152-W5-EVIDENCE"
    objective: "Consolidate fixture-only evidence and release wording."
    parallel_lld: true
    parallel_dev_after_cp5: false
    entry_conditions:
      - "S01/S02/S03/S04 design decisions available"
    stories:
      - story_id: "CR152-S05-static-evidence-release-wording"
        title: "Static evidence and release wording"
        priority: "P1"
        status: "lld-ready-for-review"
        depends_on:
          - "CR152-S01-pit-feature-label-contracts"
          - "CR152-S02-purged-embargo-cv-fixture-contract"
          - "CR152-S03-training-model-prediction-metadata"
          - "CR152-S04-ml-admission-gate-adapter"
        primary_files:
          - "process/returns/CR152-*"
          - "process/evidence/CR152-*"
          - "docs/release/*"
        merge_owner: "CR152-S05-static-evidence-release-wording"
        lld_gate:
          required: true
          required_level: "technical-note"
          status: "pending"

