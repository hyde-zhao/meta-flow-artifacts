validation_plan:
  fixture_static_only:
    - "uv run --python 3.11 pytest -q tests/research/test_ml_strategy_e2e_contracts.py"
    - "uv run --python 3.11 pytest -q tests/research/test_strategy_admission_statistical_gate.py tests/research/test_strategy_admission_package.py"
  forbidden_without_new_authorization:
    - "read .env / credentials"
    - "real model training"
    - "real data validation"
    - "model registry write / publish / promote / upload / set_current"
    - "feature / label / prediction store write"
    - "real lake/NAS/provider access"
