  catalog_pointer_mutation_allowed: false
  model_registry_write_allowed: false
  feature_label_prediction_store_write_allowed: false
  git_remote_write_allowed: false
  future_runtime_validation_policy: "Any real-data, training, registry, store or runtime validation requires a separate authorization gate or formal CR."

feature_slices:
  - feature_id: "FEAT-03"
    name: "Research Dataset And Multifactor Research Loop"
    design_docs:
      - "process/docs/features/factor-research-loop/DESIGN.md"
      - "process/docs/features/factor-research-loop/TEST-PLAN.md"
      - "process/docs/features/factor-research-loop/TASKS.md"
    stories:
